name: durak

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-durak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-durak}
      POSTGRES_DB: ${POSTGRES_DB:-durak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-durak} -d ${POSTGRES_DB:-durak}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - durak

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - durak

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-durak}:${POSTGRES_PASSWORD:-durak}@postgres:5432/${POSTGRES_DB:-durak}
      REDIS_URL: redis://redis:6379
      UPLOADS_DIR: /data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - api_uploads:/data/uploads
    networks:
      - durak

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - durak

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - durak

volumes:
  postgres_data:
  redis_data:
  api_uploads:

networks:
  durak:
    driver: bridge
